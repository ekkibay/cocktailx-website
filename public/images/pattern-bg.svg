<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="p" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Bay of Many background -->
      <rect width="100" height="100" fill="#223a7b"/>
      <!-- Left column: Jambalaya half -->
      <rect x="0" y="0" width="50" height="100" fill="#523113"/>
      <!-- Left circle: Hibiscus left half on Jambalaya, Jambalaya right half on Blue -->
      <circle cx="50" cy="50" r="40" fill="#bd256e"/>
      <clipPath id="right">
        <rect x="50" y="0" width="50" height="100"/>
      </clipPath>
      <circle cx="50" cy="50" r="40" fill="#523113" clip-path="url(#right)"/>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#p)"/>
</svg>
